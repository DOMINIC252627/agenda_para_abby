<!DOCTYPE html>

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff1168">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Special App ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #ff7eb9; --secondary: #ff1168; }
        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; min-height: 100vh; padding-bottom: 80px;
        }

        .container {
            width: 90%; max-width: 450px; margin: 20px auto;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: none; 
        }

        .active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: rgba(255, 255, 255, 0.07); border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        input, textarea { 
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); 
            border: none; border-radius: 10px; color: white; padding: 12px; margin-bottom: 10px; outline: none;
        }

        .btn-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1000; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 50px; backdrop-filter: blur(10px);
        }

        .btn-main {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 10px 20px; border-radius: 50px;
            font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 17, 104, 0.4);
            font-size: 0.8rem;
        }

        .archive-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-top: 10px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        canvas { background: white; border-radius: 10px; width: 100%; margin-top: 10px; display: none; touch-action: none; cursor: crosshair; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ff4d4d; cursor: pointer; font-weight: bold; }
    </style>
</head>

<script>

    const ctx = canvas.getContext('2d');
    let drawing = false;

    function startDrawing() {
        canvas.style.display = 'block';
        canvas.width = canvas.offsetWidth;
        canvas.addEventListener('mousedown', (e) => { drawing = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        
        canvas.addEventListener('touchstart', (e) => { drawing = true; draw(e.touches[0]); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); }, {passive: false});
    }

    function draw(e) {
        if (!drawing) return;
        ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#302b63';
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function saveMegaNote() {
        const title = document.getElementById('mega-title').value;
        const text = document.getElementById('mega-content').value;
        const canvasData = canvas.style.display === 'block' ? canvas.toDataURL() : null;
        const file = document.getElementById('image-input').files[0];

        const processSave = (imgData = null) => {
            if(!title && !text && !canvasData && !imgData) return alert("¡Nota vacía!");
            megaNotes.unshift({
                title: title || "Sin título",
                text: text,
                canvasData: canvasData,
                imgData: imgData,
                date: new Date().toLocaleString()
            });
            localStorage.setItem('megaNotes', JSON.stringify(megaNotes));
            renderArchive();
            resetFields();
        };

        if (file) {
            let reader = new FileReader();
            reader.onload = (e) => processSave(e.target.result);
            reader.readAsDataURL(file);
        } else { processSave(); }
    }

    function renderArchive() {
        document.getElementById('mega-archive').innerHTML = megaNotes.map((n, i) => `
            <div class="archive-item">
                <button onclick="deleteNote(${i})" class="delete-btn">✕</button>
                <strong style="color: var(--primary)">${n.title}</strong>
                <p style="font-size: 0.85rem; margin: 5px 0;">${n.text}</p>
                ${n.canvasData ? `<img src="${n.canvasData}" style="width:100%; background:white; border-radius:10px; margin-top:5px;">` : ''}
                ${n.imgData ? `<img src="${n.imgData}" style="width:100%; border-radius:10px; margin-top:5px;">` : ''}
            </div>
        `).join('');
    }

    function deleteNote(i) {
        megaNotes.splice(i, 1);
        localStorage.setItem('megaNotes', JSON.stringify(megaNotes));
        renderArchive();
    }

    function resetFields() {
        document.getElementById('mega-title').value = '';
        document.getElementById('mega-content').value = '';
        canvas.style.display = 'none';
        if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // --- LÓGICA DE ALARMAS ---
    let alarmas = JSON.parse(localStorage.getItem('alarmas')) || [];
    const sonido = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

    function agregarAlarma() {
        const texto = document.getElementById('recordatorio-texto').value;
        const hora = document.getElementById('recordatorio-hora').value;
        if (!texto || !hora) return alert("Faltan datos");
        alarmas.push({ texto, hora, id: Date.now(), activa: true });
        localStorage.setItem('alarmas', JSON.stringify(alarmas));
        renderAlarmas();
    }

    function renderAlarmas() {
        document.getElementById('lista-alarmas').innerHTML = alarmas.map((a, i) => `
            <div class="archive-item">
                <button onclick="eliminarAlarma(${i})" class="delete-btn">✕</button>
                <strong style="color: var(--primary)">${a.hora}</strong> - ${a.texto}
            </div>
        `).join('');
    }

    function eliminarAlarma(i) {
        alarmas.splice(i, 1);
        localStorage.setItem('alarmas', JSON.stringify(alarmas));
        renderAlarmas();
    }

    function checarHora() {
        const ahora = new Date();
        const horaActual = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');
        alarmas.forEach(a => {
            if (a.hora === horaActual && a.activa) {
                sonido.play();
                alert("🔔 RECORDATORIO: " + a.texto);
                a.activa = false; 
                localStorage.setItem('alarmas', JSON.stringify(alarmas));
            }
        });
    }

        const indiceAjustado = (diaDelAnio - 86 + misArtistas.length) % misArtistas.length;
        const artistaDeHoy = misArtistas[indiceAjustado];

        document.getElementById('musica-hoy').innerText = `Hoy suena: Especial de ${artistaDeHoy}`;
        document.getElementById('link-musica').href = "https://open.spotify.com/playlist/0kack7sAkvsXEbavXdBbtc?si=sZrZ2TjJRdKjMJUwPFvIHg&pi=eaMd51w8TT6ts";
    }

    // --- INICIALIZACIÓN ---
    window.onload = () => {
        inicializarMensajeYMusica();
        renderArchive();
        renderAlarmas();
        setInterval(checarHora, 10000);

        if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js') // Asegúrate del ./ antes del nombre
    .then(reg => console.log('SW registrado con éxito', reg))
    .catch(err => console.warn('Error al registrar SW', err));
}
    };
